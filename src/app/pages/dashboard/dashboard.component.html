<div class="logodashbord">
  <a href="https://t2s.group/notre-groupe/binarios/" target="_blank">
    <img decoding="async" src="logo.png" width="125" alt="logo.png">
  </a>
</div>

<div class="cards-grid">
  <!-- Card 1 — Total Clients -->
  <div class="stat-card blue" routerLink="/clients" style="cursor: pointer;">
    <div class="stat-icon"><img decoding="async" src="client.png" width="75" alt="client.png"></div>
    <div class="stat-number">{{ totalClients }}</div>
    <div class="stat-label">Clients</div>
  </div>

  <!-- Card 2 — Solutions -->
  <div class="stat-card blue" routerLink="/solutions" style="cursor: pointer;">
    <div class="stat-icon"><img decoding="async" src="solution.png" width="75" alt="solution.png"></div>
    <div class="stat-number">{{ totalSolutions }}</div>
    <div class="stat-label">Solutions</div>
  </div>

  <!-- Card 3 — Versions -->
  <div class="stat-card blue" routerLink="/versions" style="cursor: pointer;">
    <div class="stat-icon"><img decoding="async" src="version2.png" width="75" alt="version.png"></div>
    <div class="stat-number">{{ totalVersions }}</div>
    <div class="stat-label">Versions</div>
  </div>

  <!-- Card 4 — Planifications -->
  <div class="stat-card blue" routerLink="/planifications" style="cursor: pointer;">
    <div class="stat-icon"><img decoding="async" src="planification.png" width="75" alt="planification.png"></div>
    <div class="stat-number">{{ totalPlanifications }}</div>
    <div class="stat-label">Planifications</div>
  </div>
</div>
<br>

<!-- Second row: centered -->
<div class="cards-grid cards-grid--centered">
  <!-- Card 5 — Clients sur la dernière version -->
  <div class="stat-card blue" routerLink="/planifications" style="cursor: pointer;">
    <div class="stat-icon"><img decoding="async" src="client.png" width="75" alt="client-latest.png"></div>
    <div class="stat-number">{{ clientsAvecDerniereVersion }}</div>
    <div class="stat-label">Planifications — Dernière version</div>
  </div>

  <!-- Card 6 — Clients sur une ancienne version -->
  <div class="stat-card blue" routerLink="/planifications" style="cursor: pointer;">
    <div class="stat-icon"><img decoding="async" src="client.png" width="75" alt="client-old.png"></div>
    <div class="stat-number">{{ clientsAvecAncienneVersion }}</div>
    <div class="stat-label">Planifications — Version antérieure</div>
  </div>
</div>
